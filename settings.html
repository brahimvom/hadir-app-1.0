<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الدعم الفني</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #eceff1; 
            padding: 40px 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            margin: 0;
        }
        .form-container { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%;
            text-align: center; 
        }
        h2 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 25px; line-height: 1.6; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border: 1px solid #d1d8e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none;
            transition: border 0.3s;
            text-align: right;
        }
        input:focus, textarea:focus { border: 2px solid #34495e; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: #34495e; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #2c3e50; }
        
        .footer-note { font-size: 12px; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>الدعم الفني والتقني</h2>
        <p>نحن هنا لمساعدتك. يرجى ملء البيانات أدناه، وسنقوم بالرد عليك عبر البريد الإلكتروني في أقرب وقت ممكن.</p>
        
        <form action="https://formspree.io/f/mbdzokel" method="POST">
            <input type="text" name="name" placeholder="الاسم الكامل" required>
            <input type="email" name="_replyto" placeholder="البريد الإلكتروني" required>
            <textarea name="message" rows="5" placeholder="كيف يمكننا مساعدتك؟ (اكتب رسالتك هنا)" required></textarea>
            
            <button type="submit">إرسال الرسالة</button>
        </form>

        <div class="footer-note">سيتم توجيه رسالتك مباشرة إلى فريق الإدارة.</div>
    </div>

</body>
</html>
